server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"     always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(self)" always;

    # ── Cache: static assets with content hashes (CRA adds hash to filenames) ─
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|webp|svg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── robots.txt ────────────────────────────────────────────────────────────
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ── React SPA — send all routes to index.html ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 404 /index.html;
}

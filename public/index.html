<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1A2B3C" />
    <meta name="description" content="AYT Grup – Ankara'nın önde gelen inşaat ve müteahhitlik firması. Konut, ticari ve endüstriyel inşaat projeleri." />

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect for Google Fonts (loaded via CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      react-helmet-async manages all page-specific <title> and <meta> tags.
      The base title below is shown only during the initial load before React hydrates.
    -->
    <title>AYT Grup – İnşaat ve Müteahhitlik</title>

    <!--
      Prevent Flash of Unstyled Dark Mode.
      This inline script runs before React, reading the stored theme preference
      and immediately applying the 'dark' class to <html> if needed.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('aytgrup-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>Bu uygulamayı kullanabilmek için JavaScript'i etkinleştirmeniz gerekmektedir.</noscript>
    <div id="root"></div>
  </body>
</html>
